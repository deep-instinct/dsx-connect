name: Release DSX-Transfer Desktop (Electron)

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to a GitHub Release."
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "dsx-transfer-desktop-*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Desktop version files
        id: version
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          repo = pathlib.Path(".")
          package_json = repo / "dsx_transfer_desktop" / "package.json"
          package_lock = repo / "dsx_transfer_desktop" / "package-lock.json"
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])

          package_version = json.loads(package_json.read_text())["version"]
          lock = json.loads(package_lock.read_text())
          lock_versions = {lock.get("version"), lock.get("packages", {}).get("", {}).get("version")}
          lock_versions.discard(None)
          if lock_versions != {package_version}:
            details = ", ".join(sorted(lock_versions)) if lock_versions else "(missing)"
            raise SystemExit(f"Desktop version mismatch: package.json={package_version}, package-lock.json={details}")

          release_tag = f"dsx-transfer-desktop-{package_version}"
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          if event_name == "push" and ref_name != release_tag:
            raise SystemExit(f"Release tag mismatch: pushed {ref_name}, expected {release_tag}")

          run_number = os.environ.get("GITHUB_RUN_NUMBER", "0")
          artifact_suffix = f"{package_version}-build.{run_number}"
          with github_output.open("a") as fh:
            fh.write(f"version={package_version}\n")
            fh.write(f"artifact_suffix={artifact_suffix}\n")
            fh.write(f"release_tag={release_tag}\n")

          print(f"Resolved DSX-Transfer Desktop version: {package_version}")
          print(f"Resolved release tag: {release_tag}")
          print(f"Artifact suffix: {artifact_suffix}")
          PY

  desktop-check:
    runs-on: ubuntu-latest
    needs: resolve-version
    defaults:
      run:
        working-directory: dsx_transfer_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dsx_transfer_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run desktop syntax check
        run: npm run check

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    needs:
      - resolve-version
      - desktop-check
    defaults:
      run:
        working-directory: dsx_transfer_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dsx_transfer_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS ${{ matrix.arch }} app
        run: npm run build:mac -- --${{ matrix.arch }}

      - name: Rename macOS artifacts
        run: |
          mkdir -p release
          find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" \) -print0 | while IFS= read -r -d '' file; do
            ext="${file##*.}"
            cp "$file" "release/dsx-transfer-desktop-${{ needs.resolve-version.outputs.artifact_suffix }}-macos-${{ matrix.arch }}.${ext}"
          done
          cp ../LICENSE release/LICENSE
          cp ../NOTICE.md release/NOTICE.md

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-transfer-desktop-macos-${{ matrix.arch }}
          path: |
            dsx_transfer_desktop/release/*

  build-windows:
    runs-on: windows-latest
    needs:
      - resolve-version
      - desktop-check
    defaults:
      run:
        working-directory: dsx_transfer_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dsx_transfer_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win

      - name: Rename Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Get-ChildItem -Path dist -File | Where-Object { $_.Extension -in ".exe", ".msi" } | ForEach-Object {
            $target = "release/dsx-transfer-desktop-${{ needs.resolve-version.outputs.artifact_suffix }}-windows$($_.Extension)"
            Copy-Item $_.FullName -Destination $target -Force
          }
          Copy-Item "..\LICENSE" -Destination "release\LICENSE" -Force
          Copy-Item "..\NOTICE.md" -Destination "release\NOTICE.md" -Force

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-transfer-desktop-windows
          path: |
            dsx_transfer_desktop/release/*

  publish-release:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/dsx-transfer-desktop-')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs:
      - resolve-version
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-transfer-desktop-macos-x64
          path: dist/release

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-transfer-desktop-macos-arm64
          path: dist/release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-transfer-desktop-windows
          path: dist/release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          files: dist/release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
