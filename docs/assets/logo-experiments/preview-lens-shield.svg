<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">DSX lens and shield logo experiments</title>
  <desc id="desc">Preview sheet showing lens and shield DSX Connect and DSX Transfer icon variants at large, 32 pixel, 16 pixel, and squircle sizes.</desc>
  <rect width="980" height="620" fill="#F8FAFC"/>
  <text x="32" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="650" fill="#111827">DSX lens and shield variants</text>
  <text x="32" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Simple silhouettes for 16x16, 32x32, and app icon squircle crops.</text>

  <defs>
    <g id="connect-lens">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M13 64 43 46v36L13 64Z" fill="#DEFF5B"/>
      <path d="M115 64 85 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M38 57h52v14H38z" fill="#DEFF5B"/>
      <circle cx="64" cy="64" r="24" fill="#001F3F"/>
      <circle cx="64" cy="64" r="18" fill="#DEFF5B"/>
      <circle cx="64" cy="64" r="9" fill="#001F3F"/>
    </g>
    <g id="transfer-lens">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M43 64 13 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M115 64 85 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M34 57h56v14H34z" fill="#DEFF5B"/>
      <circle cx="64" cy="64" r="24" fill="#001F3F"/>
      <circle cx="64" cy="64" r="18" fill="#DEFF5B"/>
      <circle cx="64" cy="64" r="9" fill="#001F3F"/>
    </g>
    <g id="connect-shield">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M13 64 43 46v36L13 64Z" fill="#DEFF5B"/>
      <path d="M115 64 85 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M38 57h52v14H38z" fill="#DEFF5B"/>
      <path d="M64 31 89 42v18c0 18-9 31-25 39-16-8-25-21-25-39V42l25-11Z" fill="#001F3F"/>
      <path d="M64 39 80 46v14c0 12-5 21-16 27-11-6-16-15-16-27V46l16-7Z" fill="#DEFF5B"/>
      <path d="M64 49 72 53v8c0 7-3 12-8 16-5-4-8-9-8-16v-8l8-4Z" fill="#001F3F"/>
    </g>
    <g id="transfer-shield">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M43 64 13 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M115 64 85 46v36l30-18Z" fill="#DEFF5B"/>
      <path d="M34 57h56v14H34z" fill="#DEFF5B"/>
      <path d="M64 31 89 42v18c0 18-9 31-25 39-16-8-25-21-25-39V42l25-11Z" fill="#001F3F"/>
      <path d="M64 39 80 46v14c0 12-5 21-16 27-11-6-16-15-16-27V46l16-7Z" fill="#DEFF5B"/>
      <path d="M64 49 72 53v8c0 7-3 12-8 16-5-4-8-9-8-16v-8l8-4Z" fill="#001F3F"/>
    </g>
    <clipPath id="squircle">
      <rect width="56" height="56" rx="14"/>
    </clipPath>
  </defs>

  <g transform="translate(32 112)">
    <text x="0" y="-18" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Lens</text>
    <rect width="430" height="198" rx="10" fill="#E5E7EB"/>
    <g transform="translate(24 24)"><use href="#connect-lens"/></g>
    <g transform="translate(184 24)"><use href="#transfer-lens"/></g>
    <text x="42" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Connect</text>
    <text x="201" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Transfer</text>
    <g transform="translate(336 30)">
      <use href="#connect-lens" transform="scale(.25)"/>
      <use href="#transfer-lens" transform="translate(48 0) scale(.25)"/>
      <use href="#connect-lens" transform="translate(0 48) scale(.125)"/>
      <use href="#transfer-lens" transform="translate(48 48) scale(.125)"/>
      <rect x="-8" y="84" width="56" height="56" rx="14" fill="#CBD5E1"/>
      <g transform="translate(-8 84)" clip-path="url(#squircle)"><use href="#connect-lens" transform="scale(.4375)"/></g>
      <rect x="56" y="84" width="56" height="56" rx="14" fill="#CBD5E1"/>
      <g transform="translate(56 84)" clip-path="url(#squircle)"><use href="#transfer-lens" transform="scale(.4375)"/></g>
    </g>
  </g>

  <g transform="translate(518 112)">
    <text x="0" y="-18" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Shield</text>
    <rect width="430" height="198" rx="10" fill="#E5E7EB"/>
    <g transform="translate(24 24)"><use href="#connect-shield"/></g>
    <g transform="translate(184 24)"><use href="#transfer-shield"/></g>
    <text x="42" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Connect</text>
    <text x="201" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Transfer</text>
    <g transform="translate(336 30)">
      <use href="#connect-shield" transform="scale(.25)"/>
      <use href="#transfer-shield" transform="translate(48 0) scale(.25)"/>
      <use href="#connect-shield" transform="translate(0 48) scale(.125)"/>
      <use href="#transfer-shield" transform="translate(48 48) scale(.125)"/>
      <rect x="-8" y="84" width="56" height="56" rx="14" fill="#CBD5E1"/>
      <g transform="translate(-8 84)" clip-path="url(#squircle)"><use href="#connect-shield" transform="scale(.4375)"/></g>
      <rect x="56" y="84" width="56" height="56" rx="14" fill="#CBD5E1"/>
      <g transform="translate(56 84)" clip-path="url(#squircle)"><use href="#transfer-shield" transform="scale(.4375)"/></g>
    </g>
  </g>

  <g transform="translate(32 374)">
    <text x="0" y="-18" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Outline lens</text>
    <rect width="916" height="164" rx="10" fill="#E5E7EB"/>
    <g transform="translate(24 18)">
      <rect x="4" y="4" width="120" height="120" rx="26" fill="#DEFF5B" stroke="#001F3F" stroke-width="8"/>
      <path d="M14 64 43 47v34L14 64Z" fill="#DEFF5B" stroke="#001F3F" stroke-width="7" stroke-linejoin="round"/>
      <path d="M114 64 85 47v34l29-17Z" fill="#DEFF5B" stroke="#001F3F" stroke-width="7" stroke-linejoin="round"/>
      <path d="M39 57h50v14H39z" fill="#001F3F"/>
      <circle cx="64" cy="64" r="23" fill="#DEFF5B" stroke="#001F3F" stroke-width="7"/>
      <circle cx="64" cy="64" r="8" fill="#001F3F"/>
    </g>
    <g transform="translate(184 18)">
      <rect x="4" y="4" width="120" height="120" rx="26" fill="#DEFF5B" stroke="#001F3F" stroke-width="8"/>
      <path d="M43 64 14 47v34l29-17Z" fill="#DEFF5B" stroke="#001F3F" stroke-width="7" stroke-linejoin="round"/>
      <path d="M114 64 85 47v34l29-17Z" fill="#DEFF5B" stroke="#001F3F" stroke-width="7" stroke-linejoin="round"/>
      <path d="M35 57h54v14H35z" fill="#001F3F"/>
      <circle cx="64" cy="64" r="23" fill="#DEFF5B" stroke="#001F3F" stroke-width="7"/>
      <circle cx="64" cy="64" r="8" fill="#001F3F"/>
    </g>
    <text x="342" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Closer to the existing DSX Connect outline treatment.</text>
    <text x="342" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">The filled lens variants are stronger at 16x16; outline variants preserve the current app icon language.</text>
  </g>
</svg>
