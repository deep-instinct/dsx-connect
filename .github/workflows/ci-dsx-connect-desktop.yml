name: CI DSX-Connect Desktop (Electron)

on:
  push:
    paths:
      - '.github/workflows/ci-dsx-connect-desktop.yml'
      - '.github/workflows/release-dsx-connect-desktop.yml'
      - 'dsx_connect_desktop/**'
  pull_request:
    paths:
      - '.github/workflows/ci-dsx-connect-desktop.yml'
      - '.github/workflows/release-dsx-connect-desktop.yml'
      - 'dsx_connect_desktop/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Desktop version files
        id: version
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          repo = pathlib.Path(".")
          package_json = repo / "dsx_connect_desktop" / "package.json"
          package_lock = repo / "dsx_connect_desktop" / "package-lock.json"
          github_output = pathlib.Path(__import__("os").environ["GITHUB_OUTPUT"])

          package_version = json.loads(package_json.read_text())["version"]
          lock = json.loads(package_lock.read_text())
          lock_versions = {lock.get("version"), lock.get("packages", {}).get("", {}).get("version")}
          lock_versions.discard(None)
          if lock_versions != {package_version}:
            details = ", ".join(sorted(lock_versions)) if lock_versions else "(missing)"
            raise SystemExit(f"Desktop version mismatch: package.json={package_version}, package-lock.json={details}")

          run_number = __import__("os").environ.get("GITHUB_RUN_NUMBER", "0")
          artifact_suffix = f"{package_version}-build.{run_number}"
          with github_output.open("a") as fh:
            fh.write(f"version={package_version}\n")
            fh.write(f"artifact_suffix={artifact_suffix}\n")

          print(f"Resolved DSX-Connect Desktop version: {package_version}")
          print(f"Artifact suffix: {artifact_suffix}")
          PY

  security-compliance:
    runs-on: ubuntu-latest
    needs: resolve-version
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: NPM vulnerability audit (prod deps)
        run: ./scripts/npm_audit_check.sh

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: dsx_connect_desktop
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  build-macos:
    runs-on: macos-latest
    needs:
      - resolve-version
      - security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:mac

      - name: Collect compliance files
        run: |
          mkdir -p dist
          cp ../LICENSE dist/LICENSE
          cp ../NOTICE.md dist/NOTICE.md

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-macos
          path: |
            dsx_connect_desktop/dist/*.dmg
            dsx_connect_desktop/dist/*.zip
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libatspi2.0-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64 \
            libxrandr2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxshmfence1 \
            fakeroot \
            rpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Linux app
        run: npm run build:linux

      - name: Collect compliance files
        run: |
          mkdir -p dist
          cp ../LICENSE dist/LICENSE
          cp ../NOTICE.md dist/NOTICE.md

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-linux
          path: |
            dsx_connect_desktop/dist/*.AppImage
            dsx_connect_desktop/dist/*.deb
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md

  build-windows:
    runs-on: windows-latest
    needs:
      - resolve-version
      - security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win

      - name: Collect compliance files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "..\\LICENSE" -Destination "dist\\LICENSE" -Force
          Copy-Item "..\\NOTICE.md" -Destination "dist\\NOTICE.md" -Force

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-windows
          path: |
            dsx_connect_desktop/dist/*.exe
            dsx_connect_desktop/dist/*.msi
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md
