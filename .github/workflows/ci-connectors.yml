name: CI - Connectors

on:
  pull_request:
    paths:
      - ".github/workflows/ci-connectors.yml"
      - "connectors/**"
      - "scripts/connectors/**"
      - "shared/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-connectors.yml"
      - "connectors/**"
      - "scripts/connectors/**"
      - "shared/**"
  workflow_dispatch:
    inputs:
      connector:
        description: "Connector slug to test, or all"
        required: false
        default: "all"

jobs:
  connector-matrix:
    runs-on: ubuntu-latest
    outputs:
      connectors: ${{ steps.matrix.outputs.connectors }}
    steps:
      - name: Select connectors
        id: matrix
        env:
          SELECTED_CONNECTOR: ${{ github.event.inputs.connector || 'all' }}
        run: |
          all='["aws_s3","azure_blob_storage","filesystem","google_cloud_storage","m365_mail","onedrive","salesforce","sharepoint"]'
          if [ "$SELECTED_CONNECTOR" = "all" ]; then
            echo "connectors=$all" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$SELECTED_CONNECTOR" "$all" <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys

          selected = sys.argv[1]
          all_connectors = json.loads(sys.argv[2])
          if selected not in all_connectors:
              raise SystemExit(f"unknown connector: {selected}")
          print("connectors=" + json.dumps([selected]))
          PY

  connector-ci:
    name: ${{ matrix.connector }}
    needs: connector-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        connector: ${{ fromJSON(needs.connector-matrix.outputs.connectors) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pytest
          if [ -f "connectors/${{ matrix.connector }}/requirements.txt" ]; then
            python -m pip install -r "connectors/${{ matrix.connector }}/requirements.txt"
          fi

      - name: Run connector tests
        run: scripts/connectors/test.sh "${{ matrix.connector }}"

      - name: Lint and render Helm chart
        run: scripts/connectors/lint-chart.sh "${{ matrix.connector }}"

      - name: Build connector image
        run: |
          scripts/connectors/build-image.sh "${{ matrix.connector }}" \
            --tag "ci-${{ github.sha }}" \
            --registry "local/dsx-connect" \
            --load
