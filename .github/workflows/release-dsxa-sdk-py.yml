name: Release DSXA SDK (Python)

on:
  push:
    tags:
      - "dsxa-sdk-py-*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to a GitHub Release."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          repo = pathlib.Path(".")
          pyproject = repo / "dsxa_sdk_py" / "pyproject.toml"
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])

          data = tomllib.loads(pyproject.read_text())
          version = data["project"]["version"]
          release_tag = f"dsxa-sdk-py-{version}"

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          if event_name == "push" and ref_name != release_tag:
            raise SystemExit(
              f"Tag/version mismatch: pushed tag {ref_name!r} does not match expected {release_tag!r}"
            )

          with github_output.open("a") as fh:
            fh.write(f"version={version}\n")
            fh.write(f"release_tag={release_tag}\n")

          print(f"Resolved DSXA SDK (Python) version: {version}")
          print(f"Resolved release tag: {release_tag}")
          PY

  build:
    runs-on: ubuntu-latest
    needs: resolve-version
    defaults:
      run:
        working-directory: dsxa_sdk_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dsxa-sdk-py-dist
          path: dsxa_sdk_py/dist/*

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          files: dsxa_sdk_py/dist/*
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          name: DSXA SDK Python ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
