site_name: DSX-Transfer
site_description: Guarded file transfer, scan-before-commit enforcement, and DSXA transfer integrations
repo_url: https://github.com/deep-instinct/dsx-connect
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: light blue
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: light blue
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Product:
      - What This Is: what-this-is.md
      - Product Modes and Diagrams: product-modes-and-diagrams.md
      - Roadmap: roadmap.md
  - Architecture:
      - Architecture: architecture.md
      - Scanner and Policy: scanner-and-policy.md
      - Audit and Checkpointing: audit-and-checkpointing.md
  - Integrations:
      - Transfer Platform Integrations: integrations.md
      - Transfer Platform Adapters: transfer-platform-adapters.md
      - SFTPGo Exemplar: sftpgo-exemplar.md
      - SFTPGo DSXA Demo Complete: sftpgo-demo-complete.md
  - Handoffs:
      - 2026-06-12 DSX-Transfer: handoffs/2026-06-12-dsx-transfer.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
