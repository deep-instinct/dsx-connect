apiVersion: v1
kind: Service
metadata:
  name: {{ include "dsx-connect.fullname" . }}-api
  labels:
    {{- include "dsx-connect.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
