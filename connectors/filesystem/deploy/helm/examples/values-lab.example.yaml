image:
  repository: dsxconnect/filesystem-connector
  pullPolicy: IfNotPresent
  # Empty tag means the chart appVersion is used. When installing from OCI with
  # --version X.Y.Z, this resolves to the matching connector image tag.
  tag: ""

env:
  LOG_LEVEL: "debug"
  DSXCONNECTOR_APP_ENV: "dev"

  # DSX-Connect 2 registration.
  # For DSX-Connect 1.x/core deployments, set REGISTER_WITH_CORE=true and
  # REGISTER_WITH_NG_CONTROL_PLANE=false.
  DSXCONNECTOR_REGISTER_WITH_CORE: "false"
  DSXCONNECTOR_REGISTER_WITH_NG_CONTROL_PLANE: "true"

  # For in-cluster DSX-Connect 2 installs, keep both URLs pointed at the API service.
  # DSXCONNECTOR_DSX_CONNECT_URL is kept for connector compatibility and 1.x/core use.
  # DSXCONNECTOR_DSX_CONNECT_NG_URL is used for DSX-Connect 2 registration and heartbeats.
  DSXCONNECTOR_DSX_CONNECT_URL: "http://dsx-connect-api:8091"
  DSXCONNECTOR_DSX_CONNECT_NG_URL: "http://dsx-connect-api:8091"

  # Stable identity for this running connector instance.
  # Changing this value creates a new connector identity in DSX-Connect 2.
  DSXCONNECTOR_INSTANCE_ID: "filesystem-local-1"

  # DSX-Connect 2 platform metadata.
  # PLATFORM is the connector adapter type; for this connector it should remain "filesystem".
  DSXCONNECTOR_NG_PLATFORM: "filesystem"
  # PLATFORM_KEY is a stable, operator-chosen key for the filesystem boundary this connector
  # represents in the DSX-Connect 2 console/API. It can be a cluster, site, share, or lab label.
  # Access is controlled by the Kubernetes volume mounted into the pod, not by this value.
  DSXCONNECTOR_NG_PLATFORM_KEY: "local-kubernetes"

  # Root directory that the connector scans inside the container.
  # Keep this aligned with scanVolume.mountPath unless you intentionally scan a
  # subdirectory under the mounted volume.
  DSXCONNECTOR_ASSET: "/app/scan_folder"
  # Optional include/exclude filter relative to DSXCONNECTOR_ASSET.
  DSXCONNECTOR_FILTER: ""

  # Legacy/default connector remediation behavior.
  # DSX-Connect 2 protection profiles send requested remediation actions at runtime;
  # these values are fallback defaults when no requested action is provided.
  DSXCONNECTOR_ITEM_ACTION: "nothing"
  # Quarantine destination path used when the effective action is move or move_tag.
  # If you use move-based remediation, enable quarantineVolume and keep this value
  # aligned with quarantineVolume.mountPath.
  DSXCONNECTOR_ITEM_ACTION_MOVE_METAINFO: "/app/quarantine"

  # Connector runtime state directory. The chart default uses an emptyDir volume.
  DSXCONNECTOR_DATA_DIR: "/app/data"

  # Leave disabled for connector-only smoke tests. Enable after the scan volume
  # path is stable and you want near-real-time file change monitoring.
  DSXCONNECTOR_MONITOR: "false"
  # Force polling when native filesystem notifications are unreliable, which is common
  # on some network filesystems and CSI drivers.
  DSXCONNECTOR_MONITOR_FORCE_POLLING: "false"
  DSXCONNECTOR_MONITOR_POLL_INTERVAL_MS: "1000"

  # Keep false for containerized Kubernetes deployments where the connector reads
  # mounted container paths.
  DSXCONNECTOR_SCAN_BY_PATH: "False"

auth_dsxconnect:
  enabled: false
  # Set this only when DSX-Connect connector enrollment auth is enabled.
  enrollmentSecretName: ""
  enrollmentKey: ENROLLMENT_TOKEN

scanVolume:
  enabled: true
  # In-container path for the filesystem root to scan.
  mountPath: "/app/scan_folder"
  # Preferred for production: use an existing PVC backed by the storage provider
  # that exposes the filesystem you want DSX-Connect to scan.
  existingClaim: ""
  # Lab-only fallback: node-local path on the Kubernetes node where the pod runs.
  # For Colima/k3s, this path must exist inside the VM, not just on macOS.
  hostPath: "/var/dsx-connect-2-test"
  readOnly: false
  # Optional subdirectory inside the mounted volume.
  subPath: ""

quarantineVolume:
  enabled: false
  mountPath: "/app/quarantine"
  existingClaim: ""
  # Lab-only fallback. Required only when enabled=true and existingClaim is empty.
  hostPath: ""
  readOnly: false
  subPath: ""

dataVolume:
  enabled: true
  mountPath: "/app/data"

# Uvicorn worker processes per pod.
workers: 1
# Number of connector pods. Replicas do not split a single full-scan enumeration,
# but can serve concurrent read_file/action requests through the Service.
replicaCount: 1
