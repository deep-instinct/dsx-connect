name: Release DSXA SDK (JavaScript)

on:
  push:
    tags:
      - "dsxa-sdk-js-*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to a GitHub Release."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package version
        id: version
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          repo = pathlib.Path(".")
          package_json = repo / "dsxa_sdk_js" / "package.json"
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])

          version = json.loads(package_json.read_text())["version"]
          release_tag = f"dsxa-sdk-js-{version}"

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          if event_name == "push" and ref_name != release_tag:
            raise SystemExit(
              f"Tag/version mismatch: pushed tag {ref_name!r} does not match expected {release_tag!r}"
            )

          with github_output.open("a") as fh:
            fh.write(f"version={version}\n")
            fh.write(f"release_tag={release_tag}\n")

          print(f"Resolved DSXA SDK (JavaScript) version: {version}")
          print(f"Resolved release tag: {release_tag}")
          PY

  build:
    runs-on: ubuntu-latest
    needs: resolve-version
    defaults:
      run:
        working-directory: dsxa_sdk_js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pack npm artifact
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dsxa-sdk-js-dist
          path: dsxa_sdk_js/dist/*

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          files: dsxa_sdk_js/dist/*
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          name: DSXA SDK JavaScript ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
