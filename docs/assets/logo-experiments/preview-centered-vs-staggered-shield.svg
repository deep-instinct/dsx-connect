<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" role="img" aria-labelledby="title desc">
  <title id="title">DSX centered versus staggered shield experiments</title>
  <desc id="desc">Preview comparing centered and staggered simplified shield icon variants for DSX Connect and DSX Transfer.</desc>
  <rect width="980" height="580" fill="#F8FAFC"/>
  <text x="32" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="650" fill="#111827">Centered vs staggered shield</text>
  <text x="32" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">No stems, no heavy shield border. Same shield treatment, different arrow placement.</text>

  <defs>
    <g id="connect-centered">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M14 64 46 46v36L14 64Z" fill="#DEFF5B"/>
      <path d="M114 64 82 46v36l32-18Z" fill="#DEFF5B"/>
      <path d="M64 38 82 46v17c0 15-6 27-18 34-12-7-18-19-18-34V46l18-8Z" fill="#DEFF5B"/>
      <path d="M64 51 73 55v8c0 8-3 14-9 18-6-4-9-10-9-18v-8l9-4Z" fill="#001F3F"/>
    </g>
    <g id="transfer-centered">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M46 64 14 46v36l32-18Z" fill="#DEFF5B"/>
      <path d="M114 64 82 46v36l32-18Z" fill="#DEFF5B"/>
      <path d="M64 38 82 46v17c0 15-6 27-18 34-12-7-18-19-18-34V46l18-8Z" fill="#DEFF5B"/>
      <path d="M64 51 73 55v8c0 8-3 14-9 18-6-4-9-10-9-18v-8l9-4Z" fill="#001F3F"/>
    </g>
    <g id="connect-staggered">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M16 42 48 24v36L16 42Z" fill="#DEFF5B"/>
      <path d="M112 82 80 64v36l32-18Z" fill="#DEFF5B"/>
      <path d="M64 44 79 51v13c0 12-5 21-15 27-10-6-15-15-15-27V51l15-7Z" fill="#DEFF5B"/>
      <path d="M64 54 72 58v7c0 7-3 12-8 16-5-4-8-9-8-16v-7l8-4Z" fill="#001F3F"/>
    </g>
    <g id="transfer-staggered">
      <rect width="128" height="128" rx="28" fill="#001F3F"/>
      <path d="M48 42 16 24v36l32-18Z" fill="#DEFF5B"/>
      <path d="M112 82 80 64v36l32-18Z" fill="#DEFF5B"/>
      <path d="M64 44 79 51v13c0 12-5 21-15 27-10-6-15-15-15-27V51l15-7Z" fill="#DEFF5B"/>
      <path d="M64 54 72 58v7c0 7-3 12-8 16-5-4-8-9-8-16v-7l8-4Z" fill="#001F3F"/>
    </g>
    <clipPath id="squircle"><rect width="64" height="64" rx="16"/></clipPath>
  </defs>

  <g transform="translate(32 116)">
    <rect width="430" height="178" rx="10" fill="#E5E7EB"/>
    <text x="20" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Centered</text>
    <g transform="translate(24 40)"><use href="#connect-centered"/></g>
    <g transform="translate(184 40)"><use href="#transfer-centered"/></g>
    <g transform="translate(340 50)">
      <use href="#connect-centered" transform="scale(.25)"/>
      <use href="#transfer-centered" transform="translate(48 0) scale(.25)"/>
      <use href="#connect-centered" transform="translate(0 48) scale(.125)"/>
      <use href="#transfer-centered" transform="translate(48 48) scale(.125)"/>
    </g>
  </g>

  <g transform="translate(518 116)">
    <rect width="430" height="178" rx="10" fill="#E5E7EB"/>
    <text x="20" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Staggered</text>
    <g transform="translate(24 40)"><use href="#connect-staggered"/></g>
    <g transform="translate(184 40)"><use href="#transfer-staggered"/></g>
    <g transform="translate(340 50)">
      <use href="#connect-staggered" transform="scale(.25)"/>
      <use href="#transfer-staggered" transform="translate(48 0) scale(.25)"/>
      <use href="#connect-staggered" transform="translate(0 48) scale(.125)"/>
      <use href="#transfer-staggered" transform="translate(48 48) scale(.125)"/>
    </g>
  </g>

  <g transform="translate(32 350)">
    <text x="0" y="-18" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650" fill="#111827">Squircle crops</text>
    <rect width="916" height="106" rx="10" fill="#E5E7EB"/>
    <g transform="translate(28 24)" clip-path="url(#squircle)"><use href="#connect-centered" transform="scale(.5)"/></g>
    <g transform="translate(112 24)" clip-path="url(#squircle)"><use href="#transfer-centered" transform="scale(.5)"/></g>
    <g transform="translate(220 24)" clip-path="url(#squircle)"><use href="#connect-staggered" transform="scale(.5)"/></g>
    <g transform="translate(304 24)" clip-path="url(#squircle)"><use href="#transfer-staggered" transform="scale(.5)"/></g>
    <text x="404" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Centered is calmer and more app-icon-like.</text>
    <text x="404" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Staggered has more motion and keeps more of the original DSX Connect silhouette.</text>
  </g>
</svg>
