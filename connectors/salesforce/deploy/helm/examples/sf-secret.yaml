# sf-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: salesforce-connector-credentials
stringData:
  DSXCONNECTOR_SF_AUTH_METHOD: "jwt"
  DSXCONNECTOR_SF_CLIENT_ID: "your-consumer-key"
  DSXCONNECTOR_SF_USERNAME: "user@example.com"
  DSXCONNECTOR_SF_JWT_PRIVATE_KEY: "REPLACE_WITH_BASE64_OR_PEM"
