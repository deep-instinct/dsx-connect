name: Release DSX-Connect v2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Leave blank to use dsx_connect_ng/pyproject.toml"
        required: false
        default: ""
      image_registry:
        description: "Image registry/namespace used as docker tag prefix"
        required: false
        default: "dsxconnect"
      registry_host:
        description: "OCI registry host for Docker/Helm login"
        required: false
        default: "registry-1.docker.io"
      helm_repo:
        description: "Helm OCI repo"
        required: false
        default: "oci://registry-1.docker.io/dsxconnect"
      platforms:
        description: "Buildx platforms"
        required: false
        default: "linux/amd64,linux/arm64"
      push_latest:
        description: "Also push :latest image tag"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "dsx-connect-v*"

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_registry: ${{ steps.version.outputs.image_registry }}
      registry_host: ${{ steps.version.outputs.registry_host }}
      helm_repo: ${{ steps.version.outputs.helm_repo }}
      platforms: ${{ steps.version.outputs.platforms }}
      push_latest: ${{ steps.version.outputs.push_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release inputs
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_IMAGE_REGISTRY: ${{ github.event.inputs.image_registry || 'dsxconnect' }}
          INPUT_REGISTRY_HOST: ${{ github.event.inputs.registry_host || 'registry-1.docker.io' }}
          INPUT_HELM_REPO: ${{ github.event.inputs.helm_repo || 'oci://registry-1.docker.io/dsxconnect' }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          INPUT_PUSH_LATEST: ${{ github.event.inputs.push_latest || 'true' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("dsx_connect_ng/pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r"^version\s*=\s*['\"]([^'\"]+)['\"]", text, flags=re.MULTILINE)
          if not match:
              raise SystemExit("version not found in dsx_connect_ng/pyproject.toml")
          print(match.group(1))
          PY
          )"
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            expected="dsx-connect-v${version}"
            if [ "$REF_NAME" != "$expected" ]; then
              echo "Tag/version mismatch: pushed tag '$REF_NAME' does not match expected '$expected'" >&2
              exit 1
            fi
          fi

          {
            echo "version=$version"
            echo "image_registry=$INPUT_IMAGE_REGISTRY"
            echo "registry_host=$INPUT_REGISTRY_HOST"
            echo "helm_repo=$INPUT_HELM_REPO"
            echo "platforms=$INPUT_PLATFORMS"
            echo "push_latest=$INPUT_PUSH_LATEST"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Check release secrets are present
        run: |
          test -n "${{ secrets.OCR_USERNAME }}" || (echo "OCR_USERNAME missing" && exit 1)
          test -n "${{ secrets.OCR_TOKEN }}" || (echo "OCR_TOKEN missing" && exit 1)
          echo "OCR_USERNAME present"
          echo "OCR_TOKEN present"

      - name: Show release target
        run: |
          echo "Registry host: ${{ needs.resolve-version.outputs.registry_host }}"
          echo "Image registry: ${{ needs.resolve-version.outputs.image_registry }}"
          echo "Helm repo: ${{ needs.resolve-version.outputs.helm_repo }}"
          echo "Version: ${{ needs.resolve-version.outputs.version }}"

      - name: Verify Docker Hub credentials
        run: |
          echo "${{ secrets.OCR_TOKEN }}" | docker login "${{ needs.resolve-version.outputs.registry_host }}" \
            --username "${{ secrets.OCR_USERNAME }}" \
            --password-stdin
          docker logout "${{ needs.resolve-version.outputs.registry_host }}"

      - name: Log in to OCI registry for Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OCR_USERNAME }}
          password: ${{ secrets.OCR_TOKEN }}

      - name: Log in to OCI registry for Helm
        run: |
          echo "${{ secrets.OCR_TOKEN }}" | helm registry login "${{ needs.resolve-version.outputs.registry_host }}" \
            --username "${{ secrets.OCR_USERNAME }}" \
            --password-stdin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./dsx_connect_ng[dev,workers]"

      - name: Release DSX-Connect v2
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          IMAGE_REGISTRY: ${{ needs.resolve-version.outputs.image_registry }}
          HELM_REPO: ${{ needs.resolve-version.outputs.helm_repo }}
          PLATFORMS: ${{ needs.resolve-version.outputs.platforms }}
          PUSH_LATEST: ${{ needs.resolve-version.outputs.push_latest }}
        run: |
          args=(
            --version "$VERSION"
            --registry "$IMAGE_REGISTRY"
            --helm-repo "$HELM_REPO"
            --platform "$PLATFORMS"
          )
          if [ "$PUSH_LATEST" = "true" ]; then
            args+=(--latest)
          else
            args+=(--no-latest)
          fi
          scripts/dsx-connect-ng/release.sh "${args[@]}"
