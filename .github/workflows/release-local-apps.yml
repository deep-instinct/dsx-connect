name: LEGACY Local Apps - Build macOS artifacts

on:
  workflow_dispatch:
    inputs:
      confirm_legacy_build:
        description: "Legacy pipeline. Set true only if you intentionally need old local app bundles."
        required: true
        type: boolean
        default: false
      tag:
        description: "Tag name to create/update release for (e.g., local-apps-0.3.77). Leave blank to upload artifacts only."
        required: false
      publish_release:
        description: "Upload assets to a GitHub Release (requires tag)."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-local-apps:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_legacy_build
    runs-on: macos-latest
    env:
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dsx_connect/requirements.txt
          pip install -r connectors/filesystem/requirements.txt
          pip install nuitka imageio pywebview

      - name: Import Apple signing certificate
        if: ${{ env.APPLE_CERT_P12_BASE64 != '' && env.APPLE_CERT_PASSWORD != '' }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$APPLE_CERT_P12_BASE64" | base64 -D > apple_cert.p12
          security import apple_cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f apple_cert.p12

      - name: Read dsx-connect version
        id: corever
        run: |
          ver=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path("dsx_connect/version.py").read_text()
          m = re.search(r"DSX_CONNECT_VERSION\s*=\s*'([^']+)'", text)
          print(m.group(1) if m else "latest")
          PY
          )
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build app bundles
        run: |
          set -euo pipefail
          build_app_args=()
          if [[ -n "${APPLE_CODESIGN_IDENTITY:-}" ]]; then
            build_app_args+=(--macos-sign-identity "$APPLE_CODESIGN_IDENTITY")
          fi

          python dsx_connect/local/build_local_binaries.py build-app core-gui --app-icon dsx_connect/app/static/images/dsx-connect-icon2.png "${build_app_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-app filesystem-gui --app-icon dsx_connect/app/static/images/dsx-connect-icon2.png "${build_app_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-app sharepoint-gui --app-icon dsx_connect/app/static/images/dsx-connect-icon2.png "${build_app_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-app web-launcher --app-icon dsx_connect/app/static/images/dsx-connect-icon2.png "${build_app_args[@]}"

      - name: Build pkg installers
        run: |
          set -euo pipefail
          build_pkg_args=()
          if [[ -n "${APPLE_CODESIGN_IDENTITY:-}" ]]; then
            build_pkg_args+=(--macos-sign-identity "$APPLE_CODESIGN_IDENTITY")
          fi
          if [[ -n "${APPLE_INSTALLER_IDENTITY:-}" ]]; then
            build_pkg_args+=(--pkg-sign-identity "$APPLE_INSTALLER_IDENTITY")
          fi

          python dsx_connect/local/build_local_binaries.py build-pkg core-gui --no-rebuild-apps --package-name DSXConnectLocalCore --version "${{ steps.corever.outputs.version }}" "${build_pkg_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-pkg filesystem-gui --no-rebuild-apps --package-name DSXConnectLocalFilesystem --version "${{ steps.corever.outputs.version }}" "${build_pkg_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-pkg sharepoint-gui --no-rebuild-apps --package-name DSXConnectLocalSharePoint --version "${{ steps.corever.outputs.version }}" "${build_pkg_args[@]}"
          python dsx_connect/local/build_local_binaries.py build-pkg web-launcher --no-rebuild-apps --package-name DSXConnectLocalLauncher --version "${{ steps.corever.outputs.version }}" "${build_pkg_args[@]}"

      - name: Collect release artifacts
        run: |
          mkdir -p dist/local-release
          ditto -c -k --sequesterRsrc --keepParent dist/local-apps/dsx_connect_local_gui.app dist/local-release/dsx_connect_local_gui-${{ steps.corever.outputs.version }}.zip
          ditto -c -k --sequesterRsrc --keepParent dist/local-apps/filesystem_local_gui.app dist/local-release/filesystem_local_gui-${{ steps.corever.outputs.version }}.zip
          ditto -c -k --sequesterRsrc --keepParent dist/local-apps/sharepoint_local_gui.app dist/local-release/sharepoint_local_gui-${{ steps.corever.outputs.version }}.zip
          ditto -c -k --sequesterRsrc --keepParent dist/local-apps/web_launcher.app dist/local-release/web_launcher-${{ steps.corever.outputs.version }}.zip
          cp dist/local-pkg/*.pkg dist/local-release/

      - name: Notarize and staple pkg installers
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          set -euo pipefail
          for pkg in dist/local-release/*.pkg; do
            xcrun notarytool submit "$pkg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$pkg"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local_apps_macos_${{ steps.corever.outputs.version }}
          path: dist/local-release/*

      - name: Upload release assets
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/local-release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup temporary keychain
        if: ${{ always() && env.APPLE_CERT_P12_BASE64 != '' && env.APPLE_CERT_PASSWORD != '' }}
        run: |
          security delete-keychain build.keychain || true

  build-local-web-launcher-windows:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_legacy_build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build/runtime dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r dsx_connect/requirements.txt
          pip install -r connectors/filesystem/requirements.txt
          pip install nuitka pywebview imageio

      - name: Read dsx-connect version
        id: corever
        shell: bash
        run: |
          ver=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path("dsx_connect/version.py").read_text()
          m = re.search(r"DSX_CONNECT_VERSION\s*=\s*'([^']+)'", text)
          print(m.group(1) if m else "latest")
          PY
          )
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build Windows web launcher
        shell: bash
        run: |
          python dsx_connect/local/build_local_binaries.py build web-launcher --output-dir dist/local-binaries --onefile

      - name: Archive Windows artifact
        shell: bash
        run: |
          mkdir -p dist/local-release-windows
          cp dist/local-binaries/web_launcher.exe dist/local-release-windows/web_launcher-${{ steps.corever.outputs.version }}.exe

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: local_web_launcher_windows_${{ steps.corever.outputs.version }}
          path: dist/local-release-windows/*

      - name: Upload Windows release asset
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/local-release-windows/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
