name: DSXA Client

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to when enabled (e.g., dsxa-client-0.1.0). Leave blank to build artifacts only."
        required: false
      publish_release:
        description: "Publish artifacts to a GitHub Release (requires tag in dsxa-client-<version> format)."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: dsxa_tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsxa_tauri/package-lock.json

      - name: Set up Rust
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
          else
            rustup toolchain install stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup default stable
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app bundle
        run: npm run tauri:build -- --bundles app

      - name: Collect macOS artifacts
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "src-tauri/target/release/bundle/macos/DSXA Client.app" "dist/DSXA-Client-macos-app.zip"

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsxa_tauri_macos
          path: dsxa_tauri/dist/DSXA-Client-macos-app.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dsxa_tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsxa_tauri/package-lock.json

      - name: Set up Rust
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            Start-Process -FilePath ".\rustup-init.exe" -ArgumentList "-y --default-toolchain stable" -Wait -NoNewWindow
          } else {
            rustup toolchain install stable
          }
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          rustup default stable
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installers
        run: npm run tauri:build -- --bundles nsis,msi

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" -Destination dist -Force
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" -Destination dist -Force

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsxa_tauri_windows
          path: dsxa_tauri/dist/*

  publish-release:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.tag != ''
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^dsxa-client-[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid tag '${{ inputs.tag }}'. Expected format: dsxa-client-<version> (e.g., dsxa-client-0.1.0)."
            exit 1
          fi

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dsxa_tauri_macos
          path: dist/release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dsxa_tauri_windows
          path: dist/release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
