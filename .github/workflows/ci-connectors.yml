name: CI - Connectors

on:
  pull_request:
    paths:
      - ".github/workflows/ci-connectors.yml"
      - "connectors/**"
      - "scripts/connectors/**"
      - "shared/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-connectors.yml"
      - "connectors/**"
      - "scripts/connectors/**"
      - "shared/**"
  workflow_dispatch:
    inputs:
      connector:
        description: "Connector slug to test, or all"
        required: false
        default: "all"

jobs:
  connector-ci:
    name: ${{ matrix.connector }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.connector == 'all' || inputs.connector == matrix.connector }}
    strategy:
      fail-fast: false
      matrix:
        connector:
          - aws_s3
          - azure_blob_storage
          - filesystem
          - google_cloud_storage
          - m365_mail
          - onedrive
          - salesforce
          - sharepoint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pytest
          if [ -f "connectors/${{ matrix.connector }}/requirements.txt" ]; then
            python -m pip install -r "connectors/${{ matrix.connector }}/requirements.txt"
          fi

      - name: Run connector tests
        run: scripts/connectors/test.sh "${{ matrix.connector }}"

      - name: Lint and render Helm chart
        run: scripts/connectors/lint-chart.sh "${{ matrix.connector }}"

      - name: Build connector image
        run: |
          scripts/connectors/build-image.sh "${{ matrix.connector }}" \
            --tag "ci-${{ github.sha }}" \
            --registry "local/dsx-connect" \
            --load
