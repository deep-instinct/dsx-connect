name: Release DSX-Connect Desktop (Electron)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to when enabled (e.g., dsx-connect-desktop-0.1.0). Leave blank to build artifacts only."
        required: false
      publish_release:
        description: "Publish artifacts to a GitHub Release (requires tag in dsx-connect-desktop-<version> format)."
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  security-compliance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: NPM vulnerability audit (prod deps)
        run: ./scripts/npm_audit_check.sh

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: dsx_connect_desktop
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  build-macos:
    runs-on: macos-latest
    needs: security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: npm run build:mac

      - name: Collect compliance files
        run: |
          mkdir -p dist
          cp ../../../LICENSE dist/LICENSE
          cp ../../../NOTICE.md dist/NOTICE.md

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-macos
          path: |
            dsx_connect_desktop/dist/*.dmg
            dsx_connect_desktop/dist/*.zip
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md

  build-linux:
    runs-on: ubuntu-latest
    needs: security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libatspi2.0-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64 \
            libxrandr2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxshmfence1 \
            fakeroot \
            rpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Linux app
        run: npm run build:linux

      - name: Collect compliance files
        run: |
          mkdir -p dist
          cp ../../../LICENSE dist/LICENSE
          cp ../../../NOTICE.md dist/NOTICE.md

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-linux
          path: |
            dsx_connect_desktop/dist/*.AppImage
            dsx_connect_desktop/dist/*.deb
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md

  build-windows:
    runs-on: windows-latest
    needs: security-compliance
    defaults:
      run:
        working-directory: dsx_connect_desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dsx_connect_desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build:win

      - name: Collect compliance files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "..\\..\\..\\LICENSE" -Destination "dist\\LICENSE" -Force
          Copy-Item "..\\..\\..\\NOTICE.md" -Destination "dist\\NOTICE.md" -Force

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsx-connect-desktop-windows
          path: |
            dsx_connect_desktop/dist/*.exe
            dsx_connect_desktop/dist/*.msi
            dsx_connect_desktop/dist/LICENSE
            dsx_connect_desktop/dist/NOTICE.md

  publish-release:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.tag != ''
    needs:
      - build-macos
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^dsx-connect-desktop-[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid tag '${{ inputs.tag }}'. Expected format: dsx-connect-desktop-<version> (e.g., dsx-connect-desktop-0.1.0)."
            exit 1
          fi

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-connect-desktop-macos
          path: dist/release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-connect-desktop-linux
          path: dist/release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dsx-connect-desktop-windows
          path: dist/release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
